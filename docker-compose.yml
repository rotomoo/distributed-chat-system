services:
  redis:
    container_name: redis
    image: redis:6.2
    ports:
      - 6379:6379

  redis-replica:
    container_name: redis-replica
    image: redis:6.2
    ports:
      - 6380:6379
    volumes:
      - ./conf:/usr/local/etc/redis/
    command: redis-server /usr/local/etc/redis/replica.conf

  redis-replica2:
    container_name: redis-replica2
    image: redis:6.2
    ports:
      - 6381:6379
    volumes:
      - ./conf:/usr/local/etc/redis/
    command: redis-server /usr/local/etc/redis/replica2.conf

  redis-sentinel:
    container_name: redis-sentinel
    image: redis:6.2
    ports:
      - 26379:26379
    volumes:
      - ./conf:/usr/local/etc/redis/
    command: redis-sentinel /usr/local/etc/redis/sentinel.conf

  redis-sentinel2:
    container_name: redis-sentinel2
    image: redis:6.2
    ports:
      - 26380:26379
    volumes:
      - ./conf:/usr/local/etc/redis/
    command: redis-sentinel /usr/local/etc/redis/sentinel2.conf

  redis-sentinel3:
    container_name: redis-sentinel3
    image: redis:6.2
    ports:
      - 26381:26379
    volumes:
      - ./conf:/usr/local/etc/redis/
    command: redis-sentinel /usr/local/etc/redis/sentinel3.conf

  mysql-container:
    container_name: mysql-container
    image: mysql:8.0.25
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root

  client-api:
    container_name: client-api
    build:
      context: .
      dockerfile: ./distributed-chat-system-client-api/Dockerfile
    ports:
      - "7670:7670"
    environment:
      jasypt_encryptor_password: cXVkZGxmNDEw
      spring_profiles_active: docker
  
  kafka-1:
    image: bitnami/kafka:3.9.0
    container_name: kafka-1
    ports:
      - '9194:9194'
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9192,CONTROLLER://:9193,EXTERNAL://:9194
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka-1:9192,EXTERNAL://localhost:9194
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@localhost:9193
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - '7081:8080'
    depends_on:
      - kafka-1
    environment:
      KAFKA_CLUSTERS_0_NAME: chat-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:9192

